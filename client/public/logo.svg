<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="#2d7a6b"/>
  <!-- Book body -->
  <rect x="14" y="16" width="22" height="30" rx="3" fill="#fff" opacity="0.95"/>
  <!-- Book spine -->
  <rect x="14" y="16" width="4" height="30" rx="2" fill="#c07d1e"/>
  <!-- Book lines -->
  <line x1="22" y1="24" x2="32" y2="24" stroke="#2d7a6b" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="30" x2="32" y2="30" stroke="#2d7a6b" stroke-width="2" stroke-linecap="round"/>
  <line x1="22" y1="36" x2="29" y2="36" stroke="#2d7a6b" stroke-width="2" stroke-linecap="round"/>
  <!-- Second book (behind, tilted) -->
  <rect x="28" y="18" width="22" height="28" rx="3" fill="#fff" opacity="0.7" transform="rotate(8 39 32)"/>
  <rect x="28" y="18" width="4" height="28" rx="2" fill="#c07d1e" opacity="0.8" transform="rotate(8 39 32)"/>
</svg>
